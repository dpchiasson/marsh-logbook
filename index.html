<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Marsh Logbook</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spectral:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
:root{--paper:#f3ead4;--paper-2:#ece0c2;--card:#faf3e0;--ink:#20342b;--ink-soft:#54665a;--pine:#1c3a30;--teal:#2f7d7a;--teal-deep:#1f5c59;--rust:#a8432b;--brass:#b07a2e;--line:#cdbf9c;--water:#dfe7d6;--marsh:#bcc7a2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Spectral',Georgia,serif;color:var(--ink);background:radial-gradient(circle at 20% 10%,rgba(176,122,46,.06),transparent 40%),radial-gradient(circle at 80% 90%,rgba(47,125,122,.08),transparent 45%),var(--paper);min-height:100vh;padding:0 0 40px}
.fl-head{display:flex;align-items:center;gap:20px;padding:24px 24px 16px;max-width:1000px;margin:0 auto;border-bottom:3px double var(--line)}
.fl-head-rose{font-size:44px;color:var(--brass);line-height:1;transform:rotate(8deg)}
.fl-head-text{flex:1;min-width:0}
.fl-kicker{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--teal-deep)}
.fl-title{font-family:'Fraunces',serif;font-weight:900;font-size:38px;line-height:.95;margin:4px 0 2px;color:var(--pine);letter-spacing:-.5px}
.fl-sub{font-style:italic;color:var(--ink-soft);font-size:13.5px}
.fl-head-stat{text-align:center;padding-left:16px;border-left:1px solid var(--line)}
.fl-bignum{font-family:'Fraunces',serif;font-weight:900;font-size:36px;color:var(--rust);line-height:1}
.fl-biglabel{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft)}
.fl-tabs{display:flex;gap:4px;flex-wrap:wrap;max-width:1000px;margin:14px auto 0;padding:0 24px}
.fl-tab{font-family:'Space Mono',monospace;font-size:12px;padding:9px 14px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;border-bottom:none;border-radius:6px 6px 0 0;transition:all .15s}
.fl-tab:hover{background:var(--paper-2);color:var(--ink)}
.fl-tab.is-active{background:var(--card);color:var(--pine);font-weight:700;box-shadow:0 -2px 0 var(--rust) inset}
.fl-main{max-width:1000px;margin:0 auto;padding:16px 24px}
.fl-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;box-shadow:0 1px 0 #fff inset,0 6px 20px rgba(40,50,40,.06);margin-bottom:14px}
.fl-h2{font-family:'Fraunces',serif;font-weight:600;font-size:22px;color:var(--pine);margin:0 0 14px}
.fl-h3{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--pine);margin:0 0 12px}
.fl-subhead{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--brass);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--line)}
.fl-subhead-note{letter-spacing:.3px;text-transform:none;color:var(--ink-soft);font-weight:400}
.fl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.fl-field{display:flex;flex-direction:column;gap:4px}
.fl-field-wide{grid-column:span 2}
.fl-flabel{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--ink-soft)}
input,select,textarea{font-family:'Spectral',serif;font-size:14px;color:var(--ink);padding:9px 10px;border:1px solid var(--line);border-radius:6px;background:#fffdf6;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(47,125,122,.15)}
.fl-toggle{font-family:'Space Mono',monospace;font-size:11.5px;padding:9px 10px;border:1px solid var(--line);border-radius:6px;background:#fffdf6;cursor:pointer;color:var(--ink);white-space:nowrap;width:100%}
.fl-toggle.is-on{background:var(--teal);color:#fff;border-color:var(--teal-deep)}
.fl-stop{border-left:5px solid var(--teal-deep)}
.fl-stop-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.fl-stop-badge{font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--pine)}
.fl-stop-fish{font-family:'Space Mono',monospace;font-size:11px;color:var(--rust);font-weight:700}
.fl-pickwrap{margin:10px 0}
.fl-leaflet{width:100%;height:340px;border-radius:8px;border:1px solid var(--line)}
.fl-leaflet-picker{height:280px}
.fl-catchrow{background:#fffdf6;border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:8px;padding:12px;margin-bottom:10px}
.fl-catch-top{display:flex;gap:8px;align-items:center}
.fl-catch-sp{flex:1}
.fl-custom{margin-top:8px}
.fl-counts{display:flex;gap:8px;margin-top:10px}
.fl-count{flex:1;display:flex;flex-direction:column;gap:3px}
.fl-count-lbl{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;color:var(--ink-soft);line-height:1.3;min-height:22px}
.fl-count input{text-align:center;font-weight:700;font-family:'Space Mono',monospace}
.fl-reghint{font-family:'Space Mono',monospace;font-size:10px;color:var(--brass);margin-top:8px}
.fl-btn{font-family:'Space Mono',monospace;font-size:13px;padding:11px 20px;border:1px solid var(--line);border-radius:7px;background:var(--paper-2);color:var(--ink);cursor:pointer;transition:all .15s}
.fl-btn:hover{background:var(--line)}
.fl-btn-ghost{background:transparent;border-style:dashed;font-size:12px;padding:8px 14px}
.fl-btn-add{width:100%;border-style:dashed;background:transparent;margin-bottom:14px;color:var(--teal-deep);font-weight:700}
.fl-btn-primary{background:var(--rust);color:#fff;border-color:#8c3522;font-weight:700}
.fl-btn-primary:hover{background:#92381f}
.fl-actions{display:flex;gap:10px}
.fl-controls{display:flex;gap:10px}
.fl-search{flex:1}
.fl-empty{text-align:center;color:var(--ink-soft);font-style:italic;padding:28px;font-size:15px}
.fl-mono{font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft)}
.fl-trip-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.fl-trip-date{font-family:'Fraunces',serif;font-weight:600;font-size:19px;color:var(--pine);margin-right:10px}
.fl-trip-total{font-family:'Space Mono',monospace;font-size:11px;color:var(--rust);font-weight:700}
.fl-trip-stop{border-top:1px dashed var(--line);padding:10px 0 4px;margin-top:8px}
.fl-trip-stop-head{font-size:14px;color:var(--ink);margin-bottom:6px}
.fl-catch-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.fl-pill{font-family:'Space Mono',monospace;font-size:11px;color:#fff;padding:3px 9px;border-radius:11px;font-weight:700}
.fl-pill-zero{background:var(--line)!important;color:var(--ink-soft)!important;font-weight:400}
.fl-entry-cond{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--ink-soft);line-height:1.5}
.fl-entry-notes{font-style:italic;font-size:13.5px;margin:6px 0;color:var(--ink);padding-left:10px;border-left:2px solid var(--line)}
.fl-entry-btns{display:flex;gap:6px}
.fl-mini{font-family:'Space Mono',monospace;font-size:11px;padding:5px 9px;border:1px solid var(--line);border-radius:5px;background:#fffdf6;cursor:pointer;color:var(--ink-soft)}
.fl-mini:hover{background:var(--paper-2);color:var(--ink)}
.fl-mini-del{color:var(--rust);font-weight:700}
.fl-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
.fl-calhead{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px}
.fl-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.fl-cal-dow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);text-align:center;padding-bottom:4px}
.fl-cal-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:7px;background:#fffdf6;padding:4px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;transition:all .12s}
.fl-cal-cell:hover{background:var(--paper-2)}
.fl-cal-empty{border:none;background:transparent;cursor:default}
.fl-cal-cell.has-catch{background:#f5efda;border-color:var(--brass)}
.fl-cal-cell.is-sel{box-shadow:0 0 0 2px var(--rust);border-color:var(--rust)}
.fl-cal-num{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink)}
.fl-cal-dots{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.fl-cal-dots i{width:7px;height:7px;border-radius:50%;display:inline-block}
.fl-cal-dots em{font-family:'Space Mono',monospace;font-style:normal;font-size:10px;color:var(--rust);font-weight:700;margin-left:2px}
.fl-daylist{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}
.fl-day-trip{border-bottom:1px dashed var(--line);padding:8px 0}
.fl-day-trip-head{font-size:14px;display:flex;align-items:center;gap:8px}
.fl-day-stop{font-size:13px;color:var(--ink-soft);padding:2px 0 2px 8px}
.fl-mapinfo{display:flex;align-items:flex-start;gap:10px;margin-top:12px;padding:12px 14px;background:var(--pine);color:var(--paper);font-family:'Space Mono',monospace;font-size:12px;line-height:1.6;border-radius:8px}
.fl-mapinfo .fl-dot{width:12px;height:12px;margin-top:3px}
.fl-mapinfo-hint{background:var(--paper-2);color:var(--ink-soft);font-style:italic}
.fl-note{font-size:12.5px;color:var(--ink-soft);margin:0 0 12px;font-style:italic}
.fl-note .leg{display:inline-flex;align-items:center;gap:4px;margin-left:12px;font-style:normal;font-family:'Space Mono',monospace;font-size:11px}
.fl-note .leg i{width:9px;height:9px;border-radius:50%;display:inline-block}
.fl-statsgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.fl-statcard{text-align:center;margin-bottom:0}
.fl-statnum{font-family:'Fraunces',serif;font-weight:900;font-size:32px;color:var(--rust);line-height:1}
.fl-statlbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-top:4px}
.fl-wide{grid-column:span 4;margin-bottom:0}
.fl-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.fl-bar-label{font-size:13px;width:150px;flex:none;text-align:right;color:var(--ink)}
.fl-bar-track{flex:1;height:14px;background:var(--paper-2);border-radius:7px;overflow:hidden}
.fl-bar-fill{display:block;height:100%;border-radius:7px}
.fl-bar-num{font-family:'Space Mono',monospace;font-size:12px;width:30px;color:var(--ink-soft)}
.fl-months{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:10px}
.fl-month{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.fl-month-num{font-family:'Space Mono',monospace;font-size:9px;color:var(--rust);margin-bottom:2px;font-weight:700}
.fl-month-bar{width:100%;background:var(--teal);border-radius:3px 3px 0 0;min-height:2px}
.fl-month-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-soft);margin-top:4px}
.fl-pb{font-size:14px;padding:5px 0;display:flex;align-items:center;gap:7px}
.fl-tally{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);padding-left:17px;line-height:1.6}
.fl-tally b{color:var(--ink)}
.fl-filterbar{background:var(--pine);border-radius:10px;padding:14px 16px;margin-bottom:14px;color:var(--paper)}
.fl-filter-modes{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fl-fmode{font-family:'Space Mono',monospace;font-size:11px;padding:6px 12px;border:1px solid rgba(255,255,255,.25);border-radius:20px;background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s}
.fl-fmode:hover{background:rgba(255,255,255,.12);color:#fff}
.fl-fmode.is-active{background:var(--rust);border-color:var(--rust);color:#fff;font-weight:700}
.fl-filter-row2{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fl-filter-loc{font-family:'Space Mono',monospace;font-size:12px;padding:7px 10px;border:1px solid rgba(255,255,255,.25);border-radius:7px;background:rgba(255,255,255,.08);color:#fff;width:auto;min-width:140px}
.fl-filter-loc option{background:var(--pine);color:#fff}
.fl-fclear{font-family:'Space Mono',monospace;font-size:11px;padding:7px 10px;border:1px solid rgba(255,255,255,.2);border-radius:7px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;margin-left:auto}
.fl-fclear:hover{color:#fff;background:rgba(255,255,255,.1)}
.fl-filter-active{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.12)}
.fl-filter-active b{color:#fff}
.fl-filter-cal-wrap{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.15)}
.fl-frange-hint{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.65);margin-bottom:10px}
.fl-fcal{background:rgba(255,255,255,.07);border-radius:8px;padding:12px}
.fl-fcal-head{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.fl-fcal-title{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:#fff}
.fl-fcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.fl-fcal-dow{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.45);text-align:center;padding-bottom:4px}
.fl-fcal-day{font-family:'Space Mono',monospace;font-size:12px;padding:6px 2px;border:1px solid transparent;border-radius:5px;background:transparent;color:rgba(255,255,255,.75);cursor:pointer;text-align:center;transition:all .12s;width:100%}
.fl-fcal-day:hover{background:rgba(255,255,255,.15);color:#fff}
.fl-fcal-day.in-range{background:rgba(47,125,122,.4);color:#fff}
.fl-fcal-day.is-from,.fl-fcal-day.is-to{background:var(--rust);color:#fff;font-weight:700;border-color:var(--rust)}
.fl-filter-badge{font-family:'Space Mono',monospace;font-size:13px;font-weight:400;color:var(--ink-soft);margin-left:10px}
.fl-filter-label-row{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink-soft);margin-bottom:0;grid-column:span 4}
.fl-filter-label-row b{color:var(--pine)}
.fl-io-bar{max-width:1000px;margin:16px auto 0;padding:0 24px}
.fl-io-inner{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--pine);border-radius:10px 10px 0 0;padding:12px 16px}
.fl-io-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,.6);text-transform:uppercase;margin-right:4px}
.fl-io-btn{font-family:'Space Mono',monospace;font-size:12px;padding:7px 14px;border:1px solid rgba(255,255,255,.25);border-radius:7px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.fl-io-btn:hover{background:rgba(255,255,255,.2)}
.fl-io-btn:disabled{opacity:.5;cursor:not-allowed}
.fl-io-btn-go{background:var(--teal)!important;border-color:var(--teal-deep)!important;font-weight:700}
.fl-io-btn-out{border-color:rgba(255,100,100,.4)!important;color:rgba(255,180,180,.8)!important}
.fl-io-btn-paste{border-color:rgba(255,255,255,.35)!important}
.fl-io-who{font-family:'Space Mono',monospace;font-size:11px;color:#7ed4a0;white-space:nowrap}
.fl-io-msg{font-family:'Space Mono',monospace;font-size:11px;margin-left:auto}
.fl-io-ok{color:#7ed4a0}
.fl-io-err{color:#f4a07a}
.fl-io-panel{background:rgba(0,0,0,.25);border-top:1px solid rgba(255,255,255,.12);padding:14px 16px}
.fl-io-panel-title{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,.7);margin-bottom:10px;line-height:1.5}
.fl-io-ta{width:100%;height:140px;font-family:'Space Mono',monospace;font-size:11px;background:rgba(0,0,0,.3);color:#b8d4c8;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:10px;resize:vertical;line-height:1.5}
.fl-io-panel-actions{display:flex;gap:8px;margin-top:10px}
.fl-io-hint{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);background:var(--pine);border-radius:0 0 10px 10px;padding:6px 16px 10px;border-top:1px solid rgba(255,255,255,.08)}
.fl-io-hint b{color:rgba(255,255,255,.85)}
.fl-foot{text-align:center;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin-top:20px}
@media(max-width:680px){
  .fl-head{padding:18px 14px 12px;gap:12px}
  .fl-head-rose{font-size:34px}
  .fl-title{font-size:27px}
  .fl-tabs{padding:0 14px}
  .fl-tab{padding:8px 10px;font-size:10px}
  .fl-main{padding:14px}
  .fl-card{padding:15px}
  .fl-grid{grid-template-columns:repeat(2,1fr)}
  .fl-field-wide{grid-column:span 2}
  .fl-statsgrid{grid-template-columns:repeat(2,1fr)}
  .fl-wide{grid-column:span 2}
  .fl-filter-label-row{grid-column:span 2}
  .fl-bar-label{width:90px;font-size:11px}
  .fl-leaflet{height:260px}
  .fl-leaflet-picker{height:220px}
  .fl-filter-modes{gap:4px}
  .fl-fmode{font-size:10px;padding:5px 9px}
  .fl-io-bar{padding:0 14px}
}
@media(min-width:760px){.fl-wide{grid-column:span 2}}
  </style>
</head>
<body>
<div id="root"><div style="text-align:center;padding:60px;font-family:Georgia,serif;color:#20342b">Loading Marsh Logbook…</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, useMemo, useRef, useCallback } = React;
const INSHORE = ["Speckled Trout", "Red Drum (Redfish)", "Black Drum", "Southern Flounder", "Sheepshead", "White Trout", "Sand Trout", "Croaker", "Tripletail", "Jack Crevalle", "Ladyfish", "Bluefish", "Spanish Mackerel", "Gafftopsail Catfish", "Hardhead Catfish", "Largemouth Bass", "Striped Bass", "Spotted Gar", "Mangrove Snapper"];
const OFFSHORE = ["Red Snapper", "Lane Snapper", "Vermilion Snapper (Beeliner)", "Yellowfin Tuna", "Blackfin Tuna", "Mahi-Mahi", "Wahoo", "King Mackerel", "Cobia (Ling)", "Greater Amberjack", "Grouper", "Triggerfish", "Tarpon", "Blue Marlin", "White Marlin", "Sailfish", "Bull Red (offshore)"];
const SPOTS = [
  { name: "Leeville Bridge", lat: 29.246, lng: -90.211 },
  { name: "Bay Tambour", lat: 29.27, lng: -90.3 },
  { name: "Timbalier Bay", lat: 29.12, lng: -90.42 },
  { name: "Caminada Bay", lat: 29.2, lng: -90.05 },
  { name: "Little Lake", lat: 29.45, lng: -90.18 },
  { name: "Golden Meadow Canals", lat: 29.38, lng: -90.26 },
  { name: "Catfish Lake", lat: 29.33, lng: -90.31 },
  { name: "Belle Pass", lat: 29.1, lng: -90.22 },
  { name: "Fourchon Marsh", lat: 29.13, lng: -90.19 },
  { name: "Wisner Area", lat: 29.3, lng: -90.13 }
];
const WEATHER = ["Sunny", "Partly Cloudy", "Cloudy", "Overcast", "Rain", "Fog", "Windy"];
const WIND_DIRS = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
const TIDES = ["Incoming", "High Slack", "Outgoing", "Low Slack", "Rising", "Falling"];
const MOONS = ["New", "Waxing Crescent", "First Quarter", "Waxing Gibbous", "Full", "Waning Gibbous", "Last Quarter", "Waning Crescent"];
const CLARITY = ["Clear", "Green", "Trout Green", "Stained", "Muddy / Chocolate"];
const MONTHS = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
const MONTHS_S = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
const DOW = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const TROUT = "Speckled Trout", REDFISH = "Red Drum (Redfish)";
